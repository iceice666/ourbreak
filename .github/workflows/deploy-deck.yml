name: Deploy deck

on:
  push:
    branches: [main]
    paths:
      - 'deck/**'
      - '.github/workflows/deploy-deck.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-deck
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: deck/package-lock.json

      - name: Install dependencies
        working-directory: deck
        run: npm ci

      - name: Install Playwright browser
        working-directory: deck
        run: npx playwright install chromium

      - name: Start dev server and export slide as HTML
        working-directory: deck
        run: |
          npm run dev -- --port 5173 &
          server_pid=$!
          for i in {1..30}; do
            if curl -s http://localhost:5173/s/ourbreak >/dev/null; then
              break
            fi
            sleep 1
          done
          node scripts/export-html.mjs
          kill $server_pid || true

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: deck
          command: pages deploy export --project-name=ourbreak --branch=main
